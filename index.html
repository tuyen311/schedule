    <script>
        // Configuration
const PROGRAM_COLORS = {
    BC: '#FFD700',   // vàng
    BD: '#2ecc71',   // xanh lá
    BB: '#ff69b4',   // hồng
    S1: '#9b59b6'    // tím
};
        const ROOMS = ['D101', 'D102', 'D103', 'D104', 'D201', 'D202', 'D203', 'D204', 'D301', 'D302', 'D303', 'D304', 'D401', 'D402'];
        const DAYS = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chủ Nhật'];
        const SHIFTS = [
            { name: 'Ca 1', time: '8h-11h15' },
            { name: 'Ca 2', time: '12h-15h15' },
            { name: 'Ca 3', time: '15h30-18h45' }
        ];

        const DEFAULT_SUBJECTS = [
            'Toán cao cấp',
            'Vật lý đại cương',
            'Hóa học',
            'Lập trình C++',
            'Cơ sở dữ liệu',
            'Mạng máy tính',
            'Tiếng Anh',
            'Triết học',
            'Kinh tế vi mô',
            'Marketing',
            'Kế toán',
            'Thống kê'
        ];

        // State
     let scheduleData = {};
let subjects = [];
let rowNotes = {};
let subjectProgramMap = {};
const SUPABASE_URL =
'https://ezwsccofgqqahptjxisj.supabase.co';

const SUPABASE_KEY =
'sb_publishable_bs7AyXQqJnBn6Rm0USzP5A_J5z6uTRC';

const supabaseClient =
window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);
        
async function saveToCloud(){
    try{
        await supabaseClient.from('app_data').upsert({
            id: 1,
            data: {
                scheduleData,
                subjects,
                rowNotes,
                subjectProgramMap
            }
        });
    }catch(err){
        console.error('saveToCloud', err);
    }
}

async function loadFromCloud(){
    try{
        const { data } = await supabaseClient
            .from('app_data')
            .select('*')
            .eq('id',1)
            .single();

        if(data && data.data){
            scheduleData = data.data.scheduleData || {};
            subjects = data.data.subjects || [];
            rowNotes = data.data.rowNotes || {};
            subjectProgramMap = data.data.subjectProgramMap || {};
        }
    }catch(err){
        console.error('loadFromCloud', err);
    }
}


        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await loadFromCloud();
            loadData();
            renderSubjects();
            renderScheduleTable();
            updateStats();
        });

        // Storage functions
        function saveData() {
    localStorage.setItem(
        'scheduleData',
        JSON.stringify(scheduleData)
    );

    localStorage.setItem(
        'subjects',
        JSON.stringify(subjects)
    );

    localStorage.setItem(
        'rowNotes',
        JSON.stringify(rowNotes)
    );

    localStorage.setItem(
        'subjectProgramMap',
        JSON.stringify(subjectProgramMap)
    );

    updateStats();
    saveToCloud();
}

        function loadData() {
            const savedSchedule = localStorage.getItem('scheduleData');
            const savedSubjects = localStorage.getItem('subjects');
            
            if (savedSchedule) {
                scheduleData = JSON.parse(savedSchedule);
            }
            
            if (savedSubjects) {
                subjects = JSON.parse(savedSubjects);
            }const savedNotes =
    localStorage.getItem('rowNotes');

if(savedNotes){
    rowNotes = JSON.parse(savedNotes);
}
const savedProgramMap =
    localStorage.getItem('subjectProgramMap');

if(savedProgramMap){
    subjectProgramMap =
        JSON.parse(savedProgramMap);
}
        }

        // Render subjects sidebar
        function renderSubjects() {
            const container = document.getElementById('subjectList');
           const availableSubjects =
    getAvailableSubjects();
const keyword =
    document.getElementById('subjectSearch')
        ?.value
        ?.toLowerCase()
        || '';

container.innerHTML =
    availableSubjects
    .filter(subject =>
        subject.toLowerCase()
            .includes(keyword)
    ).map((subject) => `
                <div class="subject-item"
     style="
        background:${
            PROGRAM_COLORS[
                subjectProgramMap[subject]
            ] || '#667eea'
        };
     "
                     draggable="true" 
                     data-subject="${subject}"
                     ondragstart="handleDragStart(event)"
                     ondragend="handleDragEnd(event)">
                    ${subject}
                </div>
            `).join('');
        }
function getAvailableSubjects() {

    const usedSubjects = new Set(
        Object.values(scheduleData)
    );

    return subjects.filter(subject =>
        !usedSubjects.has(subject)
    );
}
        function renderScheduleTable() {

    const table = document.getElementById('scheduleTable');

    let html = '<thead><tr>';

    html += '<th class="room-header">Phòng</th>';
    html += '<th class="shift-header">Ca</th>';

    DAYS.forEach(day=>{
        html += `<th>${day}</th>`;
    });

    html += '<th>📝 Ghi chú</th>';

    html += '</tr></thead><tbody>';

    ROOMS.forEach(room=>{

        SHIFTS.forEach((shift,shiftIndex)=>{

            html += '<tr>';

            if(shiftIndex===0){
                html += `
                <td class="room-cell" rowspan="3">
                    ${room}
                </td>
                `;
            }

            html += `
            <td class="shift-header">
                ${shift.name}<br>
                <small>${shift.time}</small>
            </td>
            `;

            DAYS.forEach((day,dayIndex)=>{

                const cellId =
                    `${room}-${dayIndex}-${shiftIndex}`;

                const content =
                    scheduleData[cellId] || '';
const stage =
    subjectProgramMap[content];

const bgColor =
    PROGRAM_COLORS[stage] ||
    '#667eea';

                const hasContent =
                    content ? 'has-content' : '';

                html += `
                <td class="schedule-cell ${hasContent}"
                    id="${cellId}"
                    ondragover="handleDragOver(event)"
                    ondragleave="handleDragLeave(event)"
                    ondrop="handleDrop(event)"
                    onclick="handleCellClick(event,'${cellId}')">

                    ${content ? `
                        <div class="cell-content"
     style="
        background:${bgColor};
        color:#fff;
        border-radius:6px;
     ">
                            ${content}
                            <button
                                class="delete-btn"
                                onclick="deleteCell(event,'${cellId}')">
                                ×
                            </button>
                        </div>
                    ` : ''}
                </td>
                `;
            });

            const noteId =
                `${room}-${shiftIndex}`;

            html += `
            <td
                onclick="editNote('${noteId}')"
                style="
                    min-width:200px;
                    background:#fff8dc;
                    text-align:left;
                    cursor:pointer;
                    padding:8px;
                ">
                ${rowNotes[noteId] || ''}
            </td>
            `;

            html += '</tr>';

        });

    });

    html += '</tbody>';

    table.innerHTML = html;
}
        // Drag and drop handlers
        function handleDragStart(e) {
            e.target.classList.add('dragging');
            e.dataTransfer.setData('text/plain', e.target.dataset.subject);
            e.dataTransfer.effectAllowed = 'copy';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }
function getTeacher(subject) {

    if (!subject.includes(' - '))
        return '';

    const parts = subject.split(' - ');

    return parts.slice(1).join(' - ').trim();
}

function teacherBusy(teacher, dayIndex, shiftIndex) {

    if (!teacher) return false;

    for (const cellId in scheduleData) {

        const subject = scheduleData[cellId];

        const currentTeacher =
            getTeacher(subject);

        if (currentTeacher !== teacher)
            continue;

        const parts = cellId.split('-');

        const cellDay =
            parseInt(parts[1]);

        const cellShift =
            parseInt(parts[2]);

        if (
            cellDay === dayIndex &&
            cellShift === shiftIndex
        ) {
            return true;
        }
    }

    return false;
}

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            const subject = e.dataTransfer.getData('text/plain');
            const cellId = e.currentTarget.id;
const teacher =
    getTeacher(subject);

const parts =
    cellId.split('-');

const dayIndex =
    parseInt(parts[1]);

const shiftIndex =
    parseInt(parts[2]);

if (
    teacherBusy(
        teacher,
        dayIndex,
        shiftIndex
    )
) {

    showToast(
        `⚠ ${teacher} đã có lớp ở ca này`,
        'error'
    );

    return;
}
            
            if (subject && cellId) {

    const existedCell = Object.keys(scheduleData)
        .find(key => scheduleData[key] === subject);

    if (existedCell && existedCell !== cellId) {

        showToast(
            `⚠ Lớp "${subject}" đã được xếp lịch`,
            'error'
        );

        return;
    }

    scheduleData[cellId] = subject;

    saveData();
    renderScheduleTable();
renderSubjects();

    showToast(
        `Đã thêm "${subject}"`,
        'success'
    );
}
}
        // Cell interactions
        function handleCellClick(e, cellId) {
            if (e.target.classList.contains('delete-btn')) return;
            
            if (!scheduleData[cellId]) {
                const subject = prompt('Nhập tên môn học:');
                if (subject && subject.trim()) {
                    scheduleData[cellId] = subject.trim();
                    saveData();
                    renderScheduleTable();
renderSubjects();
                    showToast(`Đã thêm "${subject.trim()}"`, 'success');
                }
            }
        }

        function deleteCell(e, cellId) {
            e.stopPropagation();
            const subject = scheduleData[cellId];
            delete scheduleData[cellId];
            saveData();
            renderScheduleTable();
            showToast(`Đã xóa "${subject}"`, 'error');
        }

        // Add custom subject
        function addCustomSubject() {
            const input = document.getElementById('customSubject');
            const subject = input.value.trim();
            
            if (subject && !subjects.includes(subject)) {
                subjects.push(subject);
                saveData();
                renderSubjects();
                input.value = '';
                showToast(`Đã thêm môn "${subject}"`, 'success');
            } else if (subjects.includes(subject)) {
                showToast('Môn học đã tồn tại!', 'error');
            }
        }

        // Clear all
        function clearAll() {
            if (confirm('Bạn có chắc muốn xóa tất cả lịch học?')) {
                scheduleData = {};
                saveData();
                renderScheduleTable();
renderSubjects();
                showToast('Đã xóa tất cả lịch học', 'error');
            }
        }

        // Update statistics
        function updateStats() {
            const filled = Object.keys(scheduleData).length;
            const total = ROOMS.length * DAYS.length * SHIFTS.length;
            const empty = total - filled;
            const percentage = Math.round((filled / total) * 100);
            
            document.getElementById('filledCount').textContent = filled;
            document.getElementById('emptyCount').textContent = empty;
            document.getElementById('percentage').textContent = percentage + '%';
        }
function replaceText() {

    const oldText = prompt("Nhập nội dung cần thay:");

    if (!oldText) return;

    const newText = prompt("Nhập nội dung mới:");

    if (!newText) return;

    let count = 0;

    Object.keys(scheduleData).forEach(cellId => {

        if (scheduleData[cellId] === oldText) {
            scheduleData[cellId] = newText;
            count++;
        }

    });

    saveData();
    renderScheduleTable();

    showToast(`Đã cập nhật ${count} ô`, 'success');
}

function removeUnusedSubjects() {

    if(!confirm(
        "Xóa tất cả môn học chưa được sử dụng khỏi danh sách?"
    )) return;

    const usedSubjects = new Set(
        Object.values(scheduleData)
    );

    const before = subjects.length;

    subjects = subjects.filter(subject =>
        usedSubjects.has(subject)
    );

    saveData();
    renderSubjects();

    showToast(
        `🧹 Đã dọn ${before - subjects.length} môn`,
        'success'
    );
}
function replaceClassList(event) {

    const file = event.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const workbook = XLSX.read(
            new Uint8Array(e.target.result),
            { type: 'array' }
        );

        const sheet =
            workbook.Sheets[
                workbook.SheetNames[0]
            ];

        const rows =
            XLSX.utils.sheet_to_json(sheet, {
                header: 1
            });

        const newSubjects = [];
        const newProgramMap = {};

        rows.forEach((row, index) => {

            if(index === 0) return;

            const maLop =
                row[0]?.toString().trim();

            const gv =
                row[1]?.toString().trim();

            const stage =
                row[2]?.toString().trim().toUpperCase();

            if(!maLop) return;

            const text = gv
                ? `${maLop} - ${gv}`
                : maLop;

            newSubjects.push(text);

            newProgramMap[text] = stage;
        });

        // thay danh sách lớp
        subjects = newSubjects;

        // thay stage map
        subjectProgramMap = newProgramMap;

        // dọn lịch của những lớp không còn tồn tại
        Object.keys(scheduleData).forEach(cellId => {

            const subject =
                scheduleData[cellId];

            if(!subjects.includes(subject)){

                delete scheduleData[cellId];
            }
        });

        saveData();

        renderSubjects();
        renderScheduleTable();

        showToast(
            `🔄 Đã cập nhật ${subjects.length} lớp và giữ nguyên lịch đã xếp`,
            'success'
        );
    };

    reader.readAsArrayBuffer(file);
}
